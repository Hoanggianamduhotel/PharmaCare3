services:
  - type: web
    name: pharmacare
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: redirect
        source: /*
        destination: https://pharmacare.onrender.com/$1
        permanent: false