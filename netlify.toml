[build]
  publish = "dist"
  command = "npm run build"
  functions = "netlify/functions"

# API redirects to Netlify Functions
# Ưu tiên các route cụ thể trước
[[redirects]]
  from = "/api/medicines/low-stock"
  to = "/.netlify/functions/medicines-low-stock"
  status = 200

[[redirects]]
  from = "/api/medicines/*"
  to = "/.netlify/functions/medicines"
  status = 200

[[redirects]]
  from = "/api/thuoc/*"
  to = "/.netlify/functions/thuoc"
  status = 200

[[redirects]]
  from = "/api/statistics"
  to = "/.netlify/functions/statistics"
  status = 200

[[redirects]]
  from = "/api/prescriptions"
  to = "/.netlify/functions/prescriptions"
  status = 200

[[redirects]]
  from = "/api/patients"
  to = "/.netlify/functions/patients"
  status = 200

# SPA fallback cho React/Wouter/React Router
# Phải để ở cuối cùng để không đè lên API
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Ép Netlify dùng Node 20 để ổn định hơn
  NODE_VERSION = "20"
  # Xóa NODE_ENV=production ở đây để tránh lỗi thiếu Vite khi build
