[build]
  # Sửa từ "dist" thành "dist/public" để Netlify thấy file index.html của React
  publish = "dist/public"
  command = "npm run build"
  functions = "netlify/functions"

# --- API REDIRECTS TO NETLIFY FUNCTIONS ---
# Lưu ý: Đảm bảo các file trong netlify/functions/ có tên khớp với phần 'to'

[[redirects]]
  from = "/api/medicines/low-stock"
  to = "/.netlify/functions/medicines-low-stock"
  status = 200

[[redirects]]
  from = "/api/medicines/*"
  to = "/.netlify/functions/medicines"
  status = 200

[[redirects]]
  from = "/api/thuoc/*"
  to = "/.netlify/functions/thuoc"
  status = 200

[[redirects]]
  from = "/api/statistics"
  to = "/.netlify/functions/statistics"
  status = 200

[[redirects]]
  from = "/api/prescriptions"
  to = "/.netlify/functions/prescriptions"
  status = 200

[[redirects]]
  from = "/api/patients"
  to = "/.netlify/functions/patients"
  status = 200

# --- SPA FALLBACK ---
# Giúp các route của React (Wouter) không bị 404 khi refresh trang
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  # Không để NODE_ENV = "production" ở đây để đảm bảo cài đủ devDependencies lúc build
